<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate PWA Icons</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #0f0f0f;
      color: #fff;
    }
    h1 { color: #00d4ff; }
    button {
      background: #00d4ff;
      color: #000;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover { background: #00b8e6; }
    .preview {
      display: flex;
      gap: 20px;
      margin: 30px 0;
      flex-wrap: wrap;
    }
    .preview-item {
      text-align: center;
    }
    canvas {
      border: 1px solid #333;
      border-radius: 8px;
      display: block;
      margin: 10px 0;
    }
    .status {
      color: #22c55e;
      margin-top: 20px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>PWA Icon Generator</h1>
  <p>Click the buttons below to generate and download the PNG icons for your PWA.</p>

  <div class="preview" id="preview"></div>

  <div>
    <button onclick="generateAll()">Generate All Icons</button>
  </div>

  <div class="status" id="status"></div>

  <script>
    const iconData = {
      '192': {
        size: 192,
        filename: 'icon-192.png'
      },
      '512': {
        size: 512,
        filename: 'icon-512.png'
      },
      '72': {
        size: 72,
        filename: 'badge-72.png'
      }
    };

    function createSVG(size) {
      const rx = size * 0.2;
      const circleRadius = size * 0.1;
      const center = size / 2;
      const offset = size / 4;

      return `
        <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
          <rect width="${size}" height="${size}" rx="${rx}" fill="#0a0a0a"/>
          <circle cx="${center}" cy="${offset}" r="${circleRadius}" fill="#ef4444"/>
          <circle cx="${offset}" cy="${center}" r="${circleRadius}" fill="#ef4444"/>
          <circle cx="${size - offset}" cy="${center}" r="${circleRadius}" fill="#ef4444"/>
          <circle cx="${center}" cy="${size - offset}" r="${circleRadius}" fill="#ef4444"/>
        </svg>
      `;
    }

    function generateIcon(size, filename) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        const svgBlob = new Blob([createSVG(size)], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);
        const img = new Image();

        img.onload = () => {
          ctx.drawImage(img, 0, 0);
          URL.revokeObjectURL(url);

          canvas.toBlob((blob) => {
            const link = document.createElement('a');
            link.download = filename;
            link.href = URL.createObjectURL(blob);
            link.click();
            URL.revokeObjectURL(link.href);
            resolve(canvas);
          }, 'image/png');
        };

        img.src = url;
      });
    }

    async function generateAll() {
      const preview = document.getElementById('preview');
      const status = document.getElementById('status');
      preview.innerHTML = '';
      status.textContent = 'Generating icons...';

      for (const [key, data] of Object.entries(iconData)) {
        const canvas = await generateIcon(data.size, data.filename);

        const item = document.createElement('div');
        item.className = 'preview-item';
        item.innerHTML = `<h3>${data.filename}</h3>`;
        item.appendChild(canvas.cloneNode(true));
        preview.appendChild(item);
      }

      status.textContent = '✓ All icons generated and downloaded! Copy them to the /public folder.';
    }

    // Generate preview on load
    window.addEventListener('load', () => {
      const preview = document.getElementById('preview');
      Object.entries(iconData).forEach(([key, data]) => {
        const item = document.createElement('div');
        item.className = 'preview-item';

        const canvas = document.createElement('canvas');
        canvas.width = data.size;
        canvas.height = data.size;
        const ctx = canvas.getContext('2d');

        const svgBlob = new Blob([createSVG(data.size)], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(svgBlob);
        const img = new Image();

        img.onload = () => {
          ctx.drawImage(img, 0, 0);
          URL.revokeObjectURL(url);
        };

        img.src = url;

        item.innerHTML = `<h3>${data.filename} (${data.size}x${data.size})</h3>`;
        item.appendChild(canvas);
        preview.appendChild(item);
      });
    });
  </script>
</body>
</html>
